<!DOCTYPE html> 
<html>
<head>
<meta charset="UTF-8">
<title>Dólar Oficial</title>

<style>

body{
margin:0;
/* 🔥 CLAVE PARA GLIDE */
background: transparent;

font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial;
display:flex;
justify-content:center;
align-items:center;

/* mejor para embed */
height:auto;
padding:10px;

color:#e5e7eb;
}

/* CARD */
.card{
background: rgba(255,255,255,0.04);
padding:16px 18px;

border-radius:10px;
width:100%;
max-width:300px;

backdrop-filter: blur(8px);
border:1px solid rgba(255,255,255,0.08);

box-shadow:0 4px 20px rgba(0,0,0,0.4);
}

/* TITULO */
.title{
font-size:13px;
letter-spacing:1px;
text-transform:uppercase;
margin-bottom:12px;
color:#9ca3af;
text-align:left;
}

/* FILAS */
.row{
display:flex;
justify-content:space-between;
align-items:center;

padding:10px 0;
font-size:15px;

border-top:1px solid rgba(255,255,255,0.05);
}

/* VALORES */
.value{
font-weight:600;
color:#f3f4f6;
}

/* UPDATE */
.update{
margin-top:10px;
font-size:10px;
color:#6b7280;
text-align:right;
}

</style>
</head>

<body>

<div class="card">

<div class="title">Dólar Oficial</div>

<div class="row">
<span>Compra</span>
<span class="value" id="compra">-</span>
</div>

<div class="row">
<span>Venta</span>
<span class="value" id="venta">-</span>
</div>

<div class="update" id="update">
Actualizando...
</div>

</div>

<script>

async function actualizar(){

const r = await fetch("https://dolarapi.com/v1/dolares/oficial");
const data = await r.json();

document.getElementById("compra").innerText="$"+data.compra;
document.getElementById("venta").innerText="$"+data.venta;

document.getElementById("update").innerText =
"Actualizado " + new Date().toLocaleTimeString();

}

actualizar();
setInterval(actualizar,60000);

</script>

</body>
</html>
