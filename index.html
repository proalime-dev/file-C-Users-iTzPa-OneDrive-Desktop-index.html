<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<style>
  body {
    margin: 0;
    background: #000;
    font-family: 'Courier New', Courier, monospace;
    
    /* 🔥 centrado vertical */
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }

  .ticker-wrap {
    width: 100%;
    max-width: 800px; /* más centrado visualmente */
    overflow: hidden;
    height: 40px;
    background-color: #0a0a0a; 
    border-top: 1px solid #333;
    border-bottom: 1px solid #333;
    display: flex;
    align-items: center;
  }

  .ticker-track {
    display: flex;
    white-space: nowrap;
    animation: marquee 25s linear infinite;
  }

  .ticker-item {
    display: inline-block;
    padding: 0 40px;
    font-size: 16px;
    font-weight: bold;
    color: #fff;
    letter-spacing: 1px;
  }

  .label { color: #888; font-size: 13px; text-transform: uppercase; }
  .value { color: #00ff41; margin-left: 10px; }
  .sep { color: #d4af37; margin: 0 15px; }

  @keyframes marquee {
    0% { transform: translateX(0); }
    100% { transform: translateX(-50%); }
  }
</style>
</head>
<body>

<div class="ticker-wrap">
  <div class="ticker-track" id="track">
    <div class="ticker-item" id="content">

      <span class="label">DÓLAR OFICIAL COMPRA:</span> 
      <span class="value" id="compra">$---</span>

      <span class="sep">•</span>

      <span class="label">DÓLAR OFICIAL VENTA:</span> 
      <span class="value" id="venta">$---</span>

      <span class="sep">•</span>

      <span class="label">STATUS:</span> 
      <span class="value" id="status" style="color:#d4af37;">CARGANDO</span>

      <span class="sep">•</span>

    </div>
  </div>
</div>

<script>

function horaActual(){
  const ahora = new Date();
  return ahora.toLocaleTimeString('es-AR');
}

async function updatePrice() {
  try {
    const r = await fetch("https://dolarapi.com/v1/dolares/oficial");
    const data = await r.json();

    const compraStr = "$" + data.compra.toLocaleString('es-AR', {minimumFractionDigits:2});
    const ventaStr = "$" + data.venta.toLocaleString('es-AR', {minimumFractionDigits:2});

    document.getElementById('compra').innerText = compraStr;
    document.getElementById('venta').innerText = ventaStr;

    document.getElementById('status').innerText = "ACTUALIZADO " + horaActual();

    const track = document.getElementById('track');
    const content = document.getElementById('content');

    if(track.children.length < 2){
      track.appendChild(content.cloneNode(true));
      track.appendChild(content.cloneNode(true));
    }

  } catch (e) {
    document.getElementById('status').innerText = "ERROR";
    document.getElementById('status').style.color = "#ff3b30";
  }
}

updatePrice();
setInterval(updatePrice, 60000);

</script>

</body>
</html>
